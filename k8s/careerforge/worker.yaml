apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: cf-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: gitea-registry
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do sleep 2; done']
      containers:
        - name: worker
          image: git.lupulup.com/admin/careerforge-backend:latest
          command: [python, -m, celery, -A, app.worker, worker, --loglevel=info]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cf-demo-secrets
                  key: db-url-sync
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cf-demo-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cf-demo-secrets
                  key: secret-key
            - name: ENVIRONMENT
              value: development
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
