# employee portal — demo.lupulup.com
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-employee
  namespace: cf-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal-employee
  template:
    metadata:
      labels:
        app: portal-employee
    spec:
      imagePullSecrets:
        - name: gitea-registry
      containers:
        - name: portal
          image: git.lupulup.com/admin/careerforge-employee:dev
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portal-employee
  namespace: cf-demo
spec:
  selector:
    app: portal-employee
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-employee
  namespace: cf-demo
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: demo.lupulup.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal-employee
                port:
                  number: 80
