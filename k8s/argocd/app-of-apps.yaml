apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3d-app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://git.lupulup.com/admin/BankOfferingAI.git
    targetRevision: HEAD
    path: k8s/argocd
    directory:
      recurse: false
      exclude: app-of-apps.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
