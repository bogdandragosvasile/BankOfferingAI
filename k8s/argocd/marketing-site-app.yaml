apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cf-marketing-site
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://git.lupulup.com/admin/BankOfferingAI.git
    targetRevision: HEAD
    path: k8s/marketing-site
  destination:
    server: https://kubernetes.default.svc
    namespace: cf-marketing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
