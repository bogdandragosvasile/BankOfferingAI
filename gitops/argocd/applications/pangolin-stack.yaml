apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pangolin-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://git.lupulup.com/admin/BankOfferingAI.git
    targetRevision: main
    path: infra/helm/pangolin-stack
    helm:
      releaseName: pangolin-stack
      # Credentials are injected via ArgoCD secret parameters.
      # Register them in ArgoCD → Settings → Repositories or use External Secrets.
      #
      # Required parameters (provide via ArgoCD UI or sealed secrets):
      #   newt.credentials.id              - Pangolin site newt ID
      #   newt.credentials.secret          - Pangolin site newt secret
      #   operator.credentials.pangolinEmail
      #   operator.credentials.pangolinPassword
      #   operator.credentials.cfApiToken  - Cloudflare API token (dns:edit)
      #   operator.credentials.cfZoneId    - Cloudflare zone ID for lupulup.com
      #
      # Example (for manual bootstrap only):
      # parameters:
      #   - name: newt.credentials.id
      #     value: $argocd:pangolin-newt-id
      #   - name: newt.credentials.secret
      #     value: $argocd:pangolin-newt-secret
      #   - name: operator.credentials.pangolinEmail
      #     value: $argocd:pangolin-admin-email
      #   - name: operator.credentials.pangolinPassword
      #     value: $argocd:pangolin-admin-password
      #   - name: operator.credentials.cfApiToken
      #     value: $argocd:cloudflare-api-token
      #   - name: operator.credentials.cfZoneId
      #     value: $argocd:cloudflare-zone-id
      parameters: []
  destination:
    server: https://kubernetes.default.svc
    namespace: pangolin-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  # ClusterRole/ClusterRoleBinding are cluster-scoped — ignore namespace diff
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      jsonPointers:
        - /subjects/0/namespace
