apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pangolin-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"   # deploy before bankoffer so tunnel is up first
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://git.lupulup.com/admin/BankOfferingAI.git
    targetRevision: main
    path: infra/helm/pangolin-stack
    helm:
      releaseName: pangolin-stack
      # Credentials are pre-created by Terraform as K8s Secrets:
      #   pangolin-system/pangolin-stack-newt-creds     (key: config.json)
      #   pangolin-system/pangolin-stack-operator-creds (keys: PANGOLIN_EMAIL,
      #                                                   PANGOLIN_PASSWORD,
      #                                                   CF_API_TOKEN, CF_ZONE_ID)
      # See openstack-gitops/terraform/bankoffer-cluster/02-platform/secrets.tf
      parameters:
        - name: newt.credentials.existingSecret
          value: pangolin-stack-newt-creds
        - name: operator.credentials.existingSecret
          value: pangolin-stack-operator-creds
  destination:
    server: https://kubernetes.default.svc
    namespace: pangolin-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      jsonPointers:
        - /subjects/0/namespace
