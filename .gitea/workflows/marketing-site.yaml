name: marketing-site

on:
  push:
    branches: [main]
    paths:
      - 'marketing-site/**'
      - '.gitea/workflows/marketing-site.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone https://${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_TOKEN }}@git.lupulup.com/admin/BankOfferingAI.git /tmp/repo
          cd /tmp/repo && git checkout ${{ github.sha }}

      - name: Build and push
        run: |
          cd /tmp/repo
          IMAGE=git.lupulup.com/admin/marketing-site
          SHA=${{ github.sha }}

          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.lupulup.com \
            -u "${{ secrets.REGISTRY_USER }}" --password-stdin

          docker build -t ${IMAGE}:${SHA} -t ${IMAGE}:latest -f marketing-site/Dockerfile marketing-site/
          docker push ${IMAGE}:${SHA}
          docker push ${IMAGE}:latest

          docker logout git.lupulup.com

      - name: Update image tag in kustomization
        run: |
          cd /tmp/repo
          SHA=${{ github.sha }}

          # Update the kustomization.yaml to pin to the new SHA
          sed -i "s|newTag:.*|newTag: ${SHA}|" k8s/marketing-site/kustomization.yaml

          git config user.email "ci@git.lupulup.com"
          git config user.name "Gitea CI"
          git add k8s/marketing-site/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update marketing-site image to ${SHA:0:8}"
          git push origin HEAD:main

          rm -rf /tmp/repo
