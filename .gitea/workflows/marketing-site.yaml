name: marketing-site

on:
  push:
    branches: [main]
    paths:
      - 'marketing-site/**'
      - '.gitea/workflows/marketing-site.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone https://${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_TOKEN }}@git.lupulup.com/admin/BankOfferingAI.git /tmp/repo
          cd /tmp/repo && git checkout ${{ github.sha }}

      - name: Build and push
        run: |
          cd /tmp/repo
          IMAGE=git.lupulup.com/admin/marketing-site
          SHA=${{ github.sha }}

          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.lupulup.com \
            -u "${{ secrets.REGISTRY_USER }}" --password-stdin

          docker build -t ${IMAGE}:${SHA} -t ${IMAGE}:latest -f marketing-site/Dockerfile marketing-site/
          docker push ${IMAGE}:${SHA}
          docker push ${IMAGE}:latest

          docker logout git.lupulup.com
          rm -rf /tmp/repo
