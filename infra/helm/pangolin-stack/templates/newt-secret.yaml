{{- if and .Values.newt.enabled (not .Values.newt.credentials.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pangolin-stack.fullname" . }}-newt-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pangolin-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: newt
type: Opaque
stringData:
  # newt reads /app/config.yml — the entire YAML is stored as a single secret key
  config.yml: |
    id: {{ required "newt.credentials.id is required when existingSecret is not set" .Values.newt.credentials.id }}
    secret: {{ required "newt.credentials.secret is required when existingSecret is not set" .Values.newt.credentials.secret }}
    endpoint: {{ .Values.newt.credentials.endpoint | default "https://tunnel.lupulup.com" }}
    logLevel: {{ .Values.newt.credentials.logLevel | default "info" }}
{{- end }}
